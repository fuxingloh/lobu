version: '3.8'

services:
  # Build worker image that orchestrator will use
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        NODE_ENV: development
    image: peerbot-worker:latest
    # This service only builds the image, doesn't run continuously
    command: echo "Worker image built successfully"
    profiles:
      - build-only

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      NODE_ENV: development
      AGENT_DEFAULT_MODEL: ${AGENT_DEFAULT_MODEL}
      QUEUE_URL: redis://redis:6379/0
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      INGRESS_URL: ${INGRESS_URL:-http://localhost:8080}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-docker}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      HOST_PROJECT_PATH: ${PWD}
    volumes:
      # Mount source code for hot reload
      - ./packages:/app/packages:cached
      - ./tsconfig.json:/app/tsconfig.json:cached
      - ./package.json:/app/package.json:cached
      # Use named volume for node_modules to avoid conflicts
      - gateway_node_modules:/app/node_modules
      # Mount Docker socket for Docker mode
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent env storage
      - env_storage:/app/.peerbot/env
    working_dir: /app/packages/gateway
    command: bun run dev
    ports:
      - "3000:3000"
      - "8080:8080"  # OAuth and health endpoints
    networks:
      - peerbot-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - peerbot-network

networks:
  peerbot-network:
    driver: bridge

volumes:
  gateway_node_modules:
  redis_data:
  env_storage:
