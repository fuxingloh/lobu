name: Check All Workers

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Check All Workers
      run: |
        echo "=== All Worker Deployments ==="
        kubectl get deployments -n peerbot | grep worker || echo "No worker deployments"
        
        echo -e "\n=== All Worker Pods ==="
        kubectl get pods -n peerbot | grep worker || echo "No worker pods"
        
        echo -e "\n=== Latest Worker Pod Logs ==="
        LATEST_WORKER=$(kubectl get pods -n peerbot -o name | grep worker | tail -1)
        if [ ! -z "$LATEST_WORKER" ]; then
          echo "Checking logs for $LATEST_WORKER"
          kubectl logs -n peerbot $LATEST_WORKER --tail=30 || echo "Could not get logs"
        else
          echo "No worker pod found"
        fi