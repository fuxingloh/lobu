name: Restart Orchestrator

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Delete old worker pod to clean up
      run: |
        echo "Deleting old worker pod..."
        kubectl delete pod -n peerbot -l app.kubernetes.io/component=worker --ignore-not-found=true
        
    - name: Restart orchestrator
      run: |
        echo "Restarting orchestrator deployment..."
        kubectl rollout restart deployment/peerbot-orchestrator -n peerbot
        kubectl rollout status deployment/peerbot-orchestrator -n peerbot --timeout=60s
        
    - name: Check orchestrator logs
      run: |
        sleep 5
        echo "=== Orchestrator Status ==="
        kubectl get pods -n peerbot -l app.kubernetes.io/component=orchestrator
        echo -e "\n=== Orchestrator Logs ==="
        kubectl logs -n peerbot deployment/peerbot-orchestrator --tail=20