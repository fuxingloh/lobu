name: Setup Telegram Connection

on:
  workflow_dispatch:

jobs:
  setup:
    name: Create Telegram connection from K8s secret
    runs-on: ubuntu-latest
    environment: community

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Read token and setup connection
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GATEWAY_URL: https://community.lobu.ai
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN secret not set"
            exit 1
          fi
          echo "Got bot token (${#BOT_TOKEN} chars)"

          # Login to admin
          COOKIE=$(curl -s -X POST "$GATEWAY_URL/agents/login" \
            -d "password=$ADMIN_PASSWORD" \
            -D - -o /dev/null | grep -i 'set-cookie' | sed 's/set-cookie: //i' | cut -d';' -f1)
          echo "Session cookie obtained"

          # Delete existing telegram connections
          CONNECTIONS=$(curl -s -b "$COOKIE" "$GATEWAY_URL/api/v1/connections" | jq -r '.connections[] | select(.platform=="telegram") | .id')
          for id in $CONNECTIONS; do
            echo "Deleting existing connection: $id"
            curl -s -X DELETE -b "$COOKIE" "$GATEWAY_URL/api/v1/connections/$id"
          done

          # Create new connection with token in config
          RESULT=$(curl -s -X POST "$GATEWAY_URL/api/v1/connections" \
            -b "$COOKIE" \
            -H "Content-Type: application/json" \
            -d "{
              \"platform\": \"telegram\",
              \"config\": {
                \"platform\": \"telegram\",
                \"botToken\": \"$BOT_TOKEN\",
                \"mode\": \"polling\"
              },
              \"settings\": {
                \"allowGroups\": true
              }
            }")
          echo "Connection created:"
          echo "$RESULT" | jq .

          # Verify
          sleep 3
          STATUS=$(curl -s -b "$COOKIE" "$GATEWAY_URL/api/v1/connections" | jq -r '.connections[] | select(.platform=="telegram") | .status')
          echo "Connection status: $STATUS"

          METADATA=$(curl -s -b "$COOKIE" "$GATEWAY_URL/api/v1/connections" | jq '.connections[] | select(.platform=="telegram") | .metadata')
          echo "Connection metadata: $METADATA"
