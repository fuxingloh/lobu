name: Deploy to Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'charts/**'
      - 'Dockerfile.*'
      - '.github/workflows/deploy-community.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'
        type: string
  repository_dispatch:
    types: [deploy-community]

env:
  NAMESPACE: peerbot
  DEPLOYMENT_NAME: peerbot
  IMAGE_DISPATCHER: peerbot/claude-dispatcher
  IMAGE_WORKER: peerbot/claude-worker
  IMAGE_ORCHESTRATOR: peerbot/claude-orchestrator

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: community
    
    permissions:
      contents: read
      id-token: write
      packages: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.branch || 'main' }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push Dispatcher
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dispatcher
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_DISPATCHER }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_DISPATCHER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_WORKER }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_WORKER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build and Push Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.orchestrator
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_ORCHESTRATOR }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_ORCHESTRATOR }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'
          
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'
          
      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
          
      - name: Deploy with Helm
        run: |
          helm upgrade --install $DEPLOYMENT_NAME charts/peerbot \
            --namespace $NAMESPACE \
            --create-namespace \
            --values charts/peerbot/values-community.yaml \
            --set dispatcher.image.repository=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_DISPATCHER }} \
            --set dispatcher.image.tag=${{ github.sha }} \
            --set worker.image.repository=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_WORKER }} \
            --set worker.image.tag=${{ github.sha }} \
            --set orchestrator.image.repository=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_ORCHESTRATOR }} \
            --set orchestrator.image.tag=${{ github.sha }} \
            --set config.githubClientId="${{ secrets.GH_CLIENT_ID }}" \
            --set secrets.githubClientSecret="${{ secrets.GH_CLIENT_SECRET }}" \
            --set secrets.encryptionKey="${{ secrets.ENCRYPTION_KEY }}" \
            --set secrets.slackBotToken="${{ secrets.SLACK_BOT_TOKEN }}" \
            --set secrets.slackAppToken="${{ secrets.SLACK_APP_TOKEN }}" \
            --set secrets.slackSigningSecret="${{ secrets.SLACK_SIGNING_SECRET }}" \
            --set secrets.githubToken="${{ secrets.GH_TOKEN_PEERBOT }}" \
            --set secrets.claudeCodeOAuthToken="${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" \
            --set secrets.postgresqlPassword="${{ secrets.POSTGRESQL_PASSWORD }}" \
            --wait \
            --timeout 10m
            
      - name: Verify Deployment
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE