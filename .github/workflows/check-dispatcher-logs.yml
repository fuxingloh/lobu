name: Check Dispatcher Logs

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Check Dispatcher Logs
      run: |
        echo "=== Dispatcher Pod Status ==="
        kubectl get pods -n peerbot -l app.kubernetes.io/component=dispatcher
        
        echo -e "\n=== Recent Dispatcher Logs ==="
        kubectl logs -n peerbot -l app.kubernetes.io/component=dispatcher --tail=50
        
        echo -e "\n=== Check for Mentions ==="
        kubectl logs -n peerbot -l app.kubernetes.io/component=dispatcher --tail=100 | grep -i "mention" || echo "No mentions found"
        
        echo -e "\n=== Check for Enqueuing ==="
        kubectl logs -n peerbot -l app.kubernetes.io/component=dispatcher --tail=100 | grep -i "enqueu" || echo "No enqueuing found"