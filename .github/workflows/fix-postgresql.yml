name: Fix PostgreSQL StatefulSet

on:
  workflow_dispatch:

jobs:
  fix-postgresql:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.OVH_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        
    - name: Delete PostgreSQL StatefulSet
      run: |
        export KUBECONFIG=/tmp/kubeconfig
        kubectl delete statefulset peerbot-postgresql -n peerbot --ignore-not-found=true
        kubectl delete pvc -l app.kubernetes.io/name=postgresql -n peerbot --ignore-not-found=true
        
    - name: Wait for cleanup
      run: sleep 10
      
    - name: Trigger deployment
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.GH_TOKEN_PEERBOT }}
        event-type: deploy-community
        client-payload: '{"ref": "${{ github.ref }}"}'