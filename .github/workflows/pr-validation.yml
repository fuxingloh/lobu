name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            perf
            ci
            build
            revert
          
  pr-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const total = additions + deletions;
            
            if (total > 1000) {
              core.warning(`Large PR detected: ${total} lines changed. Consider breaking into smaller PRs.`);
            }
            
            console.log(`PR size: +${additions} -${deletions}`);
  
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      # Frozen-lockfile + verify-no-changes only make sense with the real
      # submodule. When stubbed (no deploy key, e.g. fork PRs), the stub
      # package.json drops the submodule's deps from the install graph, so
      # both checks would always fail.
      - name: Install dependencies (frozen)
        if: steps.submodule.outputs.stubbed != 'true'
        run: bun install --frozen-lockfile

      - name: Install dependencies (stubbed)
        if: steps.submodule.outputs.stubbed == 'true'
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Verify no uncommitted changes
        if: steps.submodule.outputs.stubbed != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes detected after build:"
            git status --porcelain
            exit 1
          fi