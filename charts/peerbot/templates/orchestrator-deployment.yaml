{{- if .Values.orchestrator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "peerbot.fullname" . }}-orchestrator
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "peerbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "peerbot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        {{- include "peerbot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: {{ include "peerbot.fullname" . }}-orchestrator
      initContainers:
      - name: wait-for-postgres
        image: postgres:16
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        env:
        - name: PGHOST
          value: {{ include "peerbot.fullname" . }}-postgresql
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          value: {{ .Values.postgresql.username | default "postgres" }}
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "peerbot.fullname" . }}-secrets
              key: postgresql-password
        - name: PGDATABASE
          value: {{ .Values.postgresql.database | default "peerbot" }}
        command:
        - sh
        - -c
        - |
          until pg_isready; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: orchestrator
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
        imagePullPolicy: {{ .Values.orchestrator.image.pullPolicy }}
        
        env:
        # Database connection (single DATABASE_URL for everything)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "peerbot.fullname" . }}-secrets
              key: database-url
        
        # Sentry configuration
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: {{ include "peerbot.fullname" . }}-secrets
              key: sentry-dsn
              optional: true
        
        # pgboss configuration
        - name: PGBOSS_RETRY_LIMIT
          value: "{{ .Values.pgboss.retryLimit }}"
        - name: PGBOSS_RETRY_DELAY
          value: "{{ .Values.pgboss.retryDelay }}"
        - name: PGBOSS_EXPIRE_HOURS
          value: "{{ .Values.pgboss.expireInHours }}"
        
        # Worker image configuration
        - name: WORKER_IMAGE_REPOSITORY
          value: {{ .Values.worker.image.repository }}
        - name: WORKER_IMAGE_TAG
          value: {{ .Values.worker.image.tag }}
        - name: WORKER_IMAGE_PULL_POLICY
          value: {{ .Values.worker.image.pullPolicy }}
        
        # Worker resource configuration
        - name: WORKER_CPU_REQUEST
          value: {{ .Values.worker.resources.requests.cpu | quote }}
        - name: WORKER_MEMORY_REQUEST
          value: {{ .Values.worker.resources.requests.memory | quote }}
        - name: WORKER_CPU_LIMIT
          value: {{ .Values.worker.resources.limits.cpu | quote }}
        - name: WORKER_MEMORY_LIMIT
          value: {{ .Values.worker.resources.limits.memory | quote }}
        
        # Kubernetes configuration
        - name: KUBERNETES_NAMESPACE
          value: {{ .Values.kubernetes.namespace }}
        
        # Orchestrator configuration
        - name: ORCHESTRATOR_PORT
          value: "8080"
        - name: LOG_LEVEL
          value: {{ .Values.orchestrator.logLevel | default "info" }}
        - name: NODE_ENV
          value: "production"
        - name: WORKER_IDLE_CLEANUP_MINUTES
          value: {{ .Values.orchestrator.idleCleanupMinutes | default "60" | quote }}
        - name: MAX_WORKER_DEPLOYMENTS
          value: {{ .Values.orchestrator.maxWorkerDeployments | default "100" | quote }}
        
        # Anthropic proxy configuration for worker deployments (always enabled)
        - name: DISPATCHER_SERVICE_NAME
          value: {{ include "peerbot.fullname" . }}-dispatcher
        - name: DISPATCHER_SERVICE_PORT
          value: "{{ .Values.dispatcher.service.port }}"
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        resources:
          requests:
            cpu: {{ .Values.orchestrator.resources.requests.cpu }}
            memory: {{ .Values.orchestrator.resources.requests.memory }}
          limits:
            cpu: {{ .Values.orchestrator.resources.limits.cpu }}
            memory: {{ .Values.orchestrator.resources.limits.memory }}
{{- end }}