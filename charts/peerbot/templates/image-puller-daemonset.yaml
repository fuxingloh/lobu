{{- if .Values.imagePuller.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "peerbot.fullname" . }}-image-puller
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "peerbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-puller
spec:
  selector:
    matchLabels:
      {{- include "peerbot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: image-puller
  template:
    metadata:
      labels:
        {{- include "peerbot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: image-puller
    spec:
      {{- if .Values.imagePuller.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.imagePuller.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePuller.tolerations }}
      tolerations:
        {{- toYaml .Values.imagePuller.tolerations | nindent 8 }}
      {{- end }}
      initContainers:
      # Pre-pull worker image
      - name: pull-worker-image
        image: "{{ .Values.global.imageRegistry }}{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
        imagePullPolicy: Always
        command: ["/bin/sh", "-c", "echo 'Worker image pulled successfully'"]
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
          limits:
            memory: "50Mi"
            cpu: "100m"
      # Pre-pull dispatcher image
      - name: pull-dispatcher-image
        image: "{{ .Values.global.imageRegistry }}{{ .Values.dispatcher.image.repository }}:{{ .Values.dispatcher.image.tag }}"
        imagePullPolicy: Always
        command: ["/bin/sh", "-c", "echo 'Dispatcher image pulled successfully'"]
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
          limits:
            memory: "50Mi"
            cpu: "100m"
      # Pre-pull orchestrator image
      - name: pull-orchestrator-image
        image: "{{ .Values.global.imageRegistry }}{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
        imagePullPolicy: Always
        command: ["/bin/sh", "-c", "echo 'Orchestrator image pulled successfully'"]
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
          limits:
            memory: "50Mi"
            cpu: "100m"
      containers:
      # Keep a minimal pause container running
      - name: pause
        image: busybox:1.36
        command: ["/bin/sh", "-c", "while true; do sleep 86400; done"]
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
          limits:
            memory: "50Mi"
            cpu: "50m"
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
{{- end }}