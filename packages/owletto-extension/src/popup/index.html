<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owletto</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #f5f5f5;
        --bg-secondary: #ffffff;
        --text-primary: #333333;
        --text-secondary: #666666;
        --text-muted: #999999;
        --border-color: #e0e0e0;
        --accent-color: #4CAF50;
        --accent-hover: #43A047;
        --success-bg: #E8F5E9;
        --success-text: #2E7D32;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-primary: #1a1a1a;
          --bg-secondary: #2d2d2d;
          --text-primary: #e0e0e0;
          --text-secondary: #b0b0b0;
          --text-muted: #808080;
          --border-color: #404040;
          --accent-color: #66BB6A;
          --accent-hover: #81C784;
          --success-bg: #1b3d1f;
          --success-text: #81C784;
        }
      }

      body {
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
