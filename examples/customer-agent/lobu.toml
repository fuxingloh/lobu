# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started
#
# Each [agents.{id}] defines an agent. The dir field points to a directory
# containing IDENTITY.md, SOUL.md, USER.md, and optionally skills/.
# Shared skills in the root skills/ directory are available to all agents.

[agents.customer-agent]
name = "customer-agent"
description = ""
dir = "./agents/customer-agent"

# LLM providers (order = priority, key = API key or $ENV_VAR)
# Add providers via the admin page or uncomment below:
# [[agents.customer-agent.providers]]
# id = "anthropic"
# key = "$ANTHROPIC_API_KEY"

# Telegram connection (add via admin page or set bot token in .env):
# [[agents.customer-agent.connections]]
# platform = "telegram"
# bot_token = "$TELEGRAM_BOT_TOKEN"

# Skills from the registry
[agents.customer-agent.skills]
enabled = ["github"]

[agents.customer-agent.network]
allowed = ["registry.npmjs.org", ".npmjs.org", "github.com", ".github.com", ".githubusercontent.com", "cdn.jsdelivr.net", "unpkg.com", "pypi.org", "files.pythonhosted.org"]
