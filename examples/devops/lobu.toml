# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.devops-control]
name = "devops-control"
description = "Help platform teams triage incidents, reviews, and deploy safety checks"
dir = "./agents/devops"

[[agents.devops-control.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"

# Skills from the registry
[agents.devops-control.skills]
enabled = ["github"]

[agents.devops-control.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]
