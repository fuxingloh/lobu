# Generated by @peerbot/cli
# You can modify this file as needed

name: my-peerbot

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - my-peerbot-network

  gateway:
    image: buremba/peerbot-gateway:0.1.0
    ports:
      - "8080:8080"
    environment:
      DEPLOYMENT_MODE: docker
      WORKER_IMAGE: my-peerbot-worker:latest
      REDIS_URL: redis://redis:6379
      QUEUE_URL: redis://redis:6379/0
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      ANTHROPIC_PROXY_ENABLED: ${ANTHROPIC_PROXY_ENABLED}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PEERBOT_PUBLIC_GATEWAY_URL: ${PEERBOT_PUBLIC_GATEWAY_URL:-}
      HOST_PROJECT_PATH: ${PWD}
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspaces:/app/workspaces
      - env_storage:/app/.peerbot/env
    networks:
      - my-peerbot-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile.worker
      args:
        BASE_VERSION: 0.1.0
        NODE_ENV: ${NODE_ENV:-development}
    image: my-peerbot-worker:latest
    command: echo "Worker image built successfully"
    profiles:
      - build-only

networks:
  my-peerbot-network:
    driver: bridge

volumes:
  redis_data:
  env_storage:
