# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.leadership]
name = "leadership"
description = "Help leadership teams turn memos, decisions, and board materials into reusable operating context"
dir = "./agents/leadership"

[[agents.leadership.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"

# Skills from the registry
[agents.leadership.skills]
enabled = ["github"]

[agents.leadership.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]
