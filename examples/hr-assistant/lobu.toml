# lobu.toml — HR Assistant (standalone single-agent project)

[agents.hr-assistant]
name = "HR Assistant"
description = "Employee-facing HR bot for onboarding, PTO, and policy Q&A"
dir = "."

[[agents.hr-assistant.providers]]
id = "groq"
model = "llama-3.3-70b-versatile"

[agents.hr-assistant.skills]
enabled = ["github"]

[agents.hr-assistant.network]
allowed = [
  "www.googleapis.com",      # Google Calendar API
  "api.notion.com",          # Notion API (knowledge base)
]

[agents.hr-assistant.worker]
timeout_minutes = 5

[agents.hr-assistant.platforms.slack]

[agents.hr-assistant.platforms.telegram]
mode = "auto"
