# lobu.toml — Multi-agent configuration example
#
# This file defines multiple agents in a single project.
# Each agent has its own directory with IDENTITY.md, SOUL.md, USER.md, and skills/.
# Shared skills in the root skills/ directory are available to all agents.

[agents.hr-assistant]
name = "HR Assistant"
description = "Employee-facing HR bot for onboarding, PTO, and policy Q&A"
dir = "./agents/hr-assistant"

[[agents.hr-assistant.providers]]
id = "groq"
model = "llama-3.3-70b-versatile"

[agents.hr-assistant.skills]
enabled = ["github"]

[agents.hr-assistant.network]
allowed = ["www.googleapis.com", "api.notion.com"]

[agents.customer-support]
name = "Customer Support"
description = "Customer-facing support bot for tickets, FAQ, and escalation"
dir = "./agents/customer-support"

[[agents.customer-support.providers]]
id = "groq"
model = "llama-3.3-70b-versatile"

[agents.customer-support.skills]
enabled = ["github", "linear"]

[agents.customer-support.network]
allowed = ["api.linear.app", "api.zendesk.com"]
