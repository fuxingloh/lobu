# Configuration for chart-releaser
# Allows customization of the chart publishing process

# Generate release notes from charts' changelogs
generate-release-notes: true

# Skip existing releases to avoid errors
skip-existing: true

# Package path (relative to charts dir)
package-path: .cr-release-packages

# Index path for gh-pages
index-path: .cr-index

# Make charts available via GitHub Pages
pages-branch: gh-pages
pages-index-path: index.yaml

# Release name template
release-name-template: "{{ .Name }}-{{ .Version }}"

# Commit message template for index updates
commit-message-template: "Release {{ .Name }}-{{ .Version }}"